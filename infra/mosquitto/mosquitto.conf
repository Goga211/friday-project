# Dev-конфиг Mosquitto для Christopher.
# ВНИМАНИЕ: anonymous-доступ — ТОЛЬКО для локальной разработки.
# Боевой режим: mTLS (listener 8883 ниже) + ACL, allow_anonymous false.

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# --- DEV: plaintext на localhost ---
listener 1883
allow_anonymous true

# --- MQTT over WebSocket (мобильные/веб) ---
listener 9001
protocol websockets
allow_anonymous true

# --- PROD (раскомментировать после infra/scripts/gen-certs.sh): mTLS ---
# listener 8883
# allow_anonymous false
# cafile   /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile  /mosquitto/certs/server.key
# require_certificate true
# use_identity_as_username true
