# Конфиг Mosquitto для Пятницы.
# ВНИМАНИЕ: anonymous-доступ на 1883/9001 — ТОЛЬКО для локальной разработки.
# Защищённый режим — mTLS-листенер 8883; сертификаты генерит infra/scripts/gen-certs.sh
# (цель make broker делает это сама, если их ещё нет). Без файлов сертификатов
# Mosquitto НЕ стартует — поэтому листенер не закомментирован, а сертификаты обязательны.

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# Настройки аутентификации — раздельно на каждый листенер
# (иначе allow_anonymous действовал бы глобально, включая TLS-листенер).
per_listener_settings true

# --- DEV: plaintext на localhost ---
listener 1883
allow_anonymous true

# --- MQTT over WebSocket (мобильные/веб) ---
listener 9001
protocol websockets
allow_anonymous true

# --- mTLS: клиенты только с сертификатом нашего CA, имя из CN ---
listener 8883
allow_anonymous false
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate true
use_identity_as_username true
